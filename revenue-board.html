<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>营收提升总览板 — 翻译公司</title>
<style>
  :root{
    --bg:#f7f7f5; --card:#fff; --ink:#1a1a1a; --mute:#6b6b6b;
    --line:#e5e4e0; --accent:#c8451e; --ok:#2f7d4f; --warn:#b8860b; --block:#a33;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1100px;margin:0 auto;padding:40px 24px 80px}
  header{border-bottom:2px solid var(--ink);padding-bottom:20px;margin-bottom:32px;
    display:flex;justify-content:space-between;align-items:flex-start;gap:20px;flex-wrap:wrap}
  header .htext{flex:1;min-width:240px}
  h1{margin:0 0 8px;font-size:32px;letter-spacing:-0.5px}
  .sub{color:var(--mute);font-size:15px}
  .legend{display:flex;gap:16px;margin-top:14px;flex-wrap:wrap;font-size:13px}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .dot{width:10px;height:10px;border-radius:50%;display:inline-block}
  .dot.ok{background:var(--ok)} .dot.warn{background:var(--warn)}
  .dot.block{background:var(--block)} .dot.idea{background:#888}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:20px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:10px;
    padding:22px 24px;display:flex;flex-direction:column;position:relative}
  .card h2{margin:0 0 6px;font-size:18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .tag{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;letter-spacing:.5px;cursor:default}
  .tag.ok{background:#e3f1e8;color:var(--ok)}
  .tag.warn{background:#fbf1d8;color:var(--warn)}
  .tag.block{background:#f7dede;color:var(--block)}
  .tag.idea{background:#ececec;color:#555}
  .where{font-size:12px;color:var(--mute);margin-bottom:12px}
  .card ul{margin:8px 0 0;padding-left:18px}
  .card li{margin:4px 0;font-size:14.5px}
  .next{margin-top:14px;padding-top:12px;border-top:1px dashed var(--line);font-size:13.5px}
  .next b{color:var(--accent)}
  a{color:var(--accent);text-decoration:none;border-bottom:1px dotted var(--accent)}
  a:hover{opacity:.7}
  .foot{margin-top:30px;color:var(--mute);font-size:12px;text-align:center}

  /* todo list */
  .todo{margin-bottom:32px;border:2px solid var(--ink);border-radius:12px;padding:22px 24px;background:#fffdf6}
  .todo h2{margin:0 0 14px;font-size:20px;display:flex;align-items:center;gap:10px}
  .todo ul{list-style:none;padding:0;margin:0;display:grid;gap:10px}
  .todo li{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-radius:8px;
    font-size:15px;cursor:pointer;user-select:none;border:1px solid rgba(0,0,0,.06);
    transition:transform .08s ease;position:relative}
  .todo li:hover{transform:translateX(2px)}
  .todo li input[type=checkbox]{margin-top:4px;width:16px;height:16px;cursor:pointer;flex-shrink:0}
  .todo li .num{font-weight:700;margin-right:4px}
  .todo li.done .text{text-decoration:line-through;opacity:.55}
  .todo li.c1{background:#ffe8e0}
  .todo li.c2{background:#fff3cf}
  .todo li.c3{background:#e3f4dc}
  .todo li.c4{background:#daeefb}
  .todo li.c5{background:#ece0fb}
  .todo li.c6{background:#fcdcec}

  /* edit mode affordances */
  .mode-badge{font-size:12px;padding:4px 10px;border-radius:14px;font-weight:600;letter-spacing:.5px}
  .mode-badge.edit{background:#fde68a;color:#7a3e00;border:1px solid #f5b942}
  .mode-badge.view{background:#e5e4e0;color:var(--mute)}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  .btn{background:#fff;border:1px solid var(--line);padding:6px 12px;border-radius:6px;
    cursor:pointer;font-size:13px;color:var(--ink);transition:background .15s}
  .btn:hover{background:#f0efea}
  .btn.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
  .btn.primary:hover{background:#333}
  body.edit-mode .editable{cursor:text}
  body.edit-mode .editable:focus{outline:2px dashed var(--accent);outline-offset:2px;background:#fff7ed}
  body.edit-mode .card,body.edit-mode .todo li{cursor:grab}
  body.edit-mode .card.dragging,body.edit-mode .todo li.dragging{opacity:.4;cursor:grabbing}
  body:not(.edit-mode) .edit-only{display:none!important}
  .add-row{margin-top:14px;display:flex;gap:8px;flex-wrap:wrap}
  .add-row .btn{font-size:12.5px}
  .card-actions{position:absolute;top:8px;right:10px;display:none;gap:4px}
  body.edit-mode .card:hover .card-actions,
  body.edit-mode .todo li:hover .card-actions{display:flex}
  .card-actions .ax{background:rgba(255,255,255,.9);border:1px solid var(--line);
    width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;
    justify-content:center;cursor:pointer;font-size:12px;line-height:1}
  .card-actions .ax:hover{background:#fff;border-color:var(--accent)}

  /* trash bin */
  .bin{position:fixed;bottom:24px;right:24px;width:64px;height:64px;border-radius:50%;
    background:#fff;border:2px dashed #aaa;display:none;align-items:center;justify-content:center;
    font-size:28px;z-index:50;transition:all .15s;box-shadow:0 4px 14px rgba(0,0,0,.08)}
  body.edit-mode .bin{display:flex}
  .bin.over{background:#fee;border-color:var(--block);border-style:solid;transform:scale(1.15)}
  .bin .count{position:absolute;top:-4px;right:-4px;background:var(--accent);color:#fff;
    font-size:11px;padding:2px 6px;border-radius:10px;font-weight:600}

  /* context menu */
  .ctx{position:fixed;background:#fff;border:1px solid var(--line);border-radius:8px;
    box-shadow:0 6px 24px rgba(0,0,0,.12);padding:6px 0;z-index:200;min-width:160px;
    display:none;font-size:14px}
  .ctx.show{display:block}
  .ctx button{display:block;width:100%;padding:8px 14px;background:none;border:0;text-align:left;
    cursor:pointer;font-size:14px;color:var(--ink)}
  .ctx button:hover{background:#f0efea}
  .ctx button.danger{color:var(--block)}
  .ctx hr{margin:4px 0;border:0;border-top:1px solid var(--line)}

  /* archive */
  .archive{margin-top:30px;background:#fafaf6;border:1px solid var(--line);border-radius:10px;
    padding:0;overflow:hidden}
  .archive summary{padding:14px 20px;cursor:pointer;font-weight:600;font-size:15px;
    list-style:none;display:flex;justify-content:space-between;align-items:center}
  .archive summary::-webkit-details-marker{display:none}
  .archive summary::after{content:"▾";color:var(--mute);font-size:14px;transition:transform .2s}
  .archive[open] summary::after{transform:rotate(180deg)}
  .archive .archive-body{padding:0 20px 20px;border-top:1px solid var(--line)}
  .archive-item{background:#fff;border:1px solid var(--line);border-radius:6px;padding:10px 14px;
    margin-top:10px;display:flex;justify-content:space-between;align-items:center;gap:12px;font-size:14px}
  .archive-item .meta{color:var(--mute);font-size:12px;margin-top:3px}
  .archive-item .actions{display:flex;gap:6px;flex-shrink:0}
  .empty{color:var(--mute);font-size:13.5px;text-align:center;padding:16px 0}

  /* modal for edit */
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;
    justify-content:center;z-index:300;padding:20px}
  .modal.show{display:flex}
  .modal-inner{background:#fff;border-radius:10px;max-width:560px;width:100%;
    padding:24px 26px;max-height:90vh;overflow-y:auto}
  .modal h3{margin:0 0 16px;font-size:18px}
  .modal label{display:block;font-size:13px;color:var(--mute);margin:10px 0 4px}
  .modal input[type=text],.modal textarea,.modal select{width:100%;padding:8px 10px;
    border:1px solid var(--line);border-radius:6px;font-family:inherit;font-size:14px}
  .modal textarea{min-height:80px;resize:vertical}
  .modal-actions{margin-top:18px;display:flex;justify-content:flex-end;gap:8px}

  @media (max-width:600px){
    .wrap{padding:24px 14px 80px}
    h1{font-size:24px}
    .card{padding:18px}
    .todo{padding:18px}
  }
</style>
</head>

<script>
// ============ State management ============
const COLORS = ["c1","c2","c3","c4","c5","c6"];
const TAG_COLORS = {ok:"在跑",warn:"待跟进",block:"阻塞",idea:"构想中"};
const STORAGE_KEY = "revenue-board-state";

const initialData = JSON.parse(document.getElementById("board-data").textContent);
let state = loadState() || JSON.parse(JSON.stringify(initialData));
let editMode = detectEditMode();
let dragSrc = null;

function detectEditMode(){
  if (location.hash === "#edit") return true;
  if (location.hash === "#view") return false;
  // file:// origin OR localhost = local machine → edit by default
  return location.protocol === "file:" || location.hostname === "localhost" || location.hostname === "127.0.0.1";
}

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  }catch(e){return null}
}

function saveState(){
  if (!editMode) return;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function uid(prefix){return prefix + "-" + Math.random().toString(36).slice(2,8)}

// ============ Render ============
function render(){
  document.body.classList.toggle("edit-mode", editMode);
  document.getElementById("mode-badge").textContent = editMode ? "✏️ 编辑模式" : "👁 只读模式";
  document.getElementById("mode-badge").className = "mode-badge " + (editMode ? "edit" : "view");

  // updated date
  const upd = document.querySelector('[data-bind="updated"]');
  upd.textContent = state.updated;
  upd.setAttribute("contenteditable", editMode ? "true" : "false");

  // todos
  const tl = document.getElementById("todo-list");
  tl.innerHTML = "";
  state.todos.forEach(t=>{
    const li = document.createElement("li");
    li.className = t.color + (t.done ? " done" : "");
    li.dataset.id = t.id;
    li.dataset.type = "todo";
    li.draggable = editMode;
    li.innerHTML = `
      <input type="checkbox" ${t.done?"checked":""}>
      <span class="text"><span class="num">${escapeHtml(t.num)}</span><span class="editable" data-field="text" ${editMode?'contenteditable="true"':''}>${t.text}</span></span>
      <span class="card-actions edit-only">
        <span class="ax" title="归档" data-act="archive">📦</span>
      </span>`;
    tl.appendChild(li);
  });

  // cards
  const cg = document.getElementById("cards-grid");
  cg.innerHTML = "";
  state.cards.forEach(c=>{
    const div = document.createElement("div");
    div.className = "card";
    div.dataset.id = c.id;
    div.dataset.type = "card";
    div.draggable = editMode;
    const itemsHtml = c.items.map(it=>`<li><span class="editable" data-field="item" ${editMode?'contenteditable="true"':''}>${it}</span></li>`).join("");
    div.innerHTML = `
      <h2><span class="num-prefix">${escapeHtml(c.num)}</span> <span class="editable" data-field="title" ${editMode?'contenteditable="true"':''}>${escapeHtml(c.title)}</span> <span class="tag ${c.tagColor}" data-field="tag" ${editMode?'contenteditable="true"':''}>${escapeHtml(c.tag)}</span></h2>
      <div class="where"><span class="editable" data-field="where" ${editMode?'contenteditable="true"':''}>${c.where}</span></div>
      <ul>${itemsHtml}</ul>
      <div class="next"><b>下一步:</b><span class="editable" data-field="next" ${editMode?'contenteditable="true"':''}>${c.next}</span></div>
      <div class="card-actions edit-only">
        <span class="ax" title="编辑" data-act="edit">✏️</span>
        <span class="ax" title="归档" data-act="archive">📦</span>
      </div>`;
    cg.appendChild(div);
  });

  // archive
  const ab = document.getElementById("archive-body");
  document.getElementById("archive-count").textContent = state.archive.length;
  document.getElementById("bin-count").textContent = state.archive.length;
  document.getElementById("bin-count").style.display = state.archive.length ? "inline-block" : "none";
  if (state.archive.length === 0){
    ab.innerHTML = '<div class="empty">没有已归档的项目</div>';
  } else {
    ab.innerHTML = state.archive.map((a,i)=>{
      const title = a.type === "card" ? (a.data.num + " " + a.data.title) : (a.data.num + " " + stripHtml(a.data.text).slice(0,60));
      return `<div class="archive-item">
        <div><div>${escapeHtml(title)}</div><div class="meta">${a.type === "card" ? "卡片" : "待办"} · 归档于 ${a.archivedAt}</div></div>
        <div class="actions edit-only">
          <button class="btn" data-restore="${i}">↻ 还原</button>
          <button class="btn" data-delete="${i}" style="color:var(--block)">永久删除</button>
        </div>
      </div>`;
    }).join("");
  }
}

function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function stripHtml(s){const d=document.createElement('div');d.innerHTML=s;return d.textContent||""}

// ============ Edit handlers ============
document.addEventListener("input", e=>{
  if (!editMode) return;
  const el = e.target;
  if (!el.classList.contains("editable") && el.getAttribute("data-bind")!=="updated") return;
  const field = el.dataset.field;
  if (el.dataset.bind === "updated"){state.updated = el.textContent.trim(); saveState(); return;}
  const host = el.closest("[data-id]");
  if (!host) return;
  const id = host.dataset.id, type = host.dataset.type;
  if (type === "todo"){
    const t = state.todos.find(x=>x.id===id); if (!t) return;
    if (field === "text") t.text = el.innerHTML;
  } else {
    const c = state.cards.find(x=>x.id===id); if (!c) return;
    if (field === "title") c.title = el.textContent;
    else if (field === "tag") c.tag = el.textContent;
    else if (field === "where") c.where = el.innerHTML;
    else if (field === "next") c.next = el.innerHTML;
    else if (field === "item"){
      const idx = [...host.querySelectorAll('[data-field="item"]')].indexOf(el);
      if (idx >= 0) c.items[idx] = el.innerHTML;
    }
  }
  saveState();
});

// todo checkbox
document.addEventListener("change", e=>{
  if (e.target.type === "checkbox" && e.target.closest("#todo-list")){
    const li = e.target.closest("li");
    const t = state.todos.find(x=>x.id===li.dataset.id);
    if (t){t.done = e.target.checked; li.classList.toggle("done", t.done); saveState();}
  }
});

// click on card-actions
document.addEventListener("click", e=>{
  const ax = e.target.closest(".ax");
  if (ax){
    const host = ax.closest("[data-id]");
    if (!host) return;
    const act = ax.dataset.act;
    if (act === "archive") archiveItem(host.dataset.id, host.dataset.type);
    else if (act === "edit") openEdit(host.dataset.id);
    return;
  }
  const restore = e.target.dataset.restore;
  if (restore !== undefined){restoreArchive(parseInt(restore)); return;}
  const del = e.target.dataset.delete;
  if (del !== undefined){
    if (confirm("永久删除这个归档项?")){state.archive.splice(parseInt(del),1); saveState(); render();}
  }
});

// ============ Archive / restore ============
function archiveItem(id, type){
  let item;
  if (type === "todo"){
    const idx = state.todos.findIndex(x=>x.id===id);
    if (idx < 0) return;
    item = {type:"todo", data: state.todos[idx], archivedAt: new Date().toISOString().slice(0,10)};
    state.todos.splice(idx, 1);
  } else {
    const idx = state.cards.findIndex(x=>x.id===id);
    if (idx < 0) return;
    item = {type:"card", data: state.cards[idx], archivedAt: new Date().toISOString().slice(0,10)};
    state.cards.splice(idx, 1);
  }
  state.archive.unshift(item);
  saveState(); render();
}

function restoreArchive(i){
  const a = state.archive[i]; if (!a) return;
  if (a.type === "todo") state.todos.push(a.data);
  else state.cards.push(a.data);
  state.archive.splice(i,1);
  saveState(); render();
}

// ============ Drag & drop to bin / reorder ============
document.addEventListener("dragstart", e=>{
  if (!editMode) return;
  const host = e.target.closest("[data-id]");
  if (!host) return;
  dragSrc = host;
  host.classList.add("dragging");
  e.dataTransfer.effectAllowed = "move";
  e.dataTransfer.setData("text/plain", host.dataset.id);
});
document.addEventListener("dragend", e=>{
  if (dragSrc){dragSrc.classList.remove("dragging"); dragSrc=null;}
  document.getElementById("bin").classList.remove("over");
});

const bin = document.getElementById("bin");
bin.addEventListener("dragover", e=>{e.preventDefault(); bin.classList.add("over")});
bin.addEventListener("dragleave", ()=>bin.classList.remove("over"));
bin.addEventListener("drop", e=>{
  e.preventDefault();
  bin.classList.remove("over");
  if (dragSrc) archiveItem(dragSrc.dataset.id, dragSrc.dataset.type);
});

// reorder within todos
document.addEventListener("dragover", e=>{
  if (!editMode || !dragSrc) return;
  const target = e.target.closest("[data-id]");
  if (!target || target === dragSrc) return;
  if (target.dataset.type !== dragSrc.dataset.type) return;
  e.preventDefault();
  const rect = target.getBoundingClientRect();
  const after = (e.clientY - rect.top) > rect.height/2;
  const parent = target.parentNode;
  parent.insertBefore(dragSrc, after ? target.nextSibling : target);
});
document.addEventListener("drop", e=>{
  if (!editMode || !dragSrc) return;
  const target = e.target.closest("[data-id]");
  if (!target || target.dataset.type !== dragSrc.dataset.type) return;
  // re-sync state from DOM order
  const type = dragSrc.dataset.type;
  if (type === "todo"){
    const order = [...document.querySelectorAll("#todo-list li")].map(li=>li.dataset.id);
    state.todos.sort((a,b)=>order.indexOf(a.id)-order.indexOf(b.id));
  } else {
    const order = [...document.querySelectorAll("#cards-grid .card")].map(c=>c.dataset.id);
    state.cards.sort((a,b)=>order.indexOf(a.id)-order.indexOf(b.id));
  }
  saveState();
});

// ============ Context menu (right-click + long-press) ============
const ctx = document.getElementById("ctx");
function showCtx(x, y, host){
  if (!editMode) return;
  const type = host.dataset.type;
  const buttons = type === "card" ? [
    {label:"✏️ 编辑详情", act:()=>openEdit(host.dataset.id)},
    {label:"📋 复制一份", act:()=>duplicate(host.dataset.id, type)},
    {sep:true},
    {label:"📦 归档", act:()=>archiveItem(host.dataset.id, type)},
    {label:"🗑 删除", danger:true, act:()=>{if(confirm("删除?")){deleteItem(host.dataset.id,type)}}}
  ] : [
    {label:"📋 复制一份", act:()=>duplicate(host.dataset.id, type)},
    {label:"🎨 换颜色", act:()=>cycleColor(host.dataset.id)},
    {sep:true},
    {label:"📦 归档", act:()=>archiveItem(host.dataset.id, type)},
    {label:"🗑 删除", danger:true, act:()=>{if(confirm("删除?")){deleteItem(host.dataset.id,type)}}}
  ];
  ctx.innerHTML = buttons.map(b=>{
    if (b.sep) return '<hr>';
    return `<button class="${b.danger?'danger':''}">${b.label}</button>`;
  }).join("");
  [...ctx.querySelectorAll("button")].forEach((btn, i)=>{
    const def = buttons.filter(b=>!b.sep)[i];
    if (def) btn.addEventListener("click", ()=>{ctx.classList.remove("show"); def.act();});
  });
  // position
  const vw = innerWidth, vh = innerHeight;
  ctx.style.left = Math.min(x, vw-180) + "px";
  ctx.style.top  = Math.min(y, vh-200) + "px";
  ctx.classList.add("show");
}
document.addEventListener("contextmenu", e=>{
  const host = e.target.closest("[data-id]");
  if (!host || !editMode) return;
  if (e.target.classList.contains("editable")) return;  // let text edits keep native menu
  e.preventDefault();
  showCtx(e.clientX, e.clientY, host);
});
document.addEventListener("click", e=>{
  if (!ctx.contains(e.target)) ctx.classList.remove("show");
});

// long-press for mobile
let pressTimer = null, pressTarget = null;
document.addEventListener("touchstart", e=>{
  if (!editMode) return;
  const host = e.target.closest("[data-id]");
  if (!host) return;
  pressTarget = host;
  pressTimer = setTimeout(()=>{
    const t = e.touches[0];
    showCtx(t.clientX, t.clientY, host);
    pressTimer = null;
  }, 550);
});
document.addEventListener("touchend", ()=>{if(pressTimer){clearTimeout(pressTimer); pressTimer=null}});
document.addEventListener("touchmove", ()=>{if(pressTimer){clearTimeout(pressTimer); pressTimer=null}});

// ============ Add / duplicate / delete / color cycle ============
function nextNumForCard(){
  // try to generate a Chinese numeral if possible, else fallback
  return "★";
}
document.getElementById("btn-add-todo").addEventListener("click", ()=>{
  const t = {id:uid("t"), num:"★", color:COLORS[state.todos.length % COLORS.length], text:"新待办(双击编辑)"};
  state.todos.push(t); saveState(); render();
});
document.getElementById("btn-add-card").addEventListener("click", ()=>{
  const c = {id:uid("c"), num:"★", title:"新卡片", tag:"构想中", tagColor:"idea",
    where:"目标 / 渠道 / 背景", items:["要点 1","要点 2"], next:"下一步行动..."};
  state.cards.push(c); saveState(); render();
});
function duplicate(id, type){
  if (type === "todo"){
    const t = state.todos.find(x=>x.id===id); if (!t) return;
    const copy = {...t, id:uid("t"), text: t.text + "(副本)"};
    const idx = state.todos.indexOf(t);
    state.todos.splice(idx+1, 0, copy);
  } else {
    const c = state.cards.find(x=>x.id===id); if (!c) return;
    const copy = JSON.parse(JSON.stringify(c));
    copy.id = uid("c"); copy.title += "(副本)";
    const idx = state.cards.indexOf(c);
    state.cards.splice(idx+1, 0, copy);
  }
  saveState(); render();
}
function deleteItem(id, type){
  if (type === "todo") state.todos = state.todos.filter(x=>x.id!==id);
  else state.cards = state.cards.filter(x=>x.id!==id);
  saveState(); render();
}
function cycleColor(id){
  const t = state.todos.find(x=>x.id===id); if (!t) return;
  const i = COLORS.indexOf(t.color);
  t.color = COLORS[(i+1) % COLORS.length];
  saveState(); render();
}

// ============ Edit modal (full card edit) ============
function openEdit(id){
  const c = state.cards.find(x=>x.id===id); if (!c) return;
  const m = document.getElementById("modal"), mb = document.getElementById("modal-body");
  mb.innerHTML = `
    <h3>编辑卡片</h3>
    <label>编号</label><input type="text" id="m-num" value="${escapeHtml(c.num)}">
    <label>标题</label><input type="text" id="m-title" value="${escapeHtml(c.title)}">
    <label>标签文字</label><input type="text" id="m-tag" value="${escapeHtml(c.tag)}">
    <label>标签颜色</label>
    <select id="m-tagColor">
      <option value="ok" ${c.tagColor==="ok"?"selected":""}>绿色(进行顺利)</option>
      <option value="warn" ${c.tagColor==="warn"?"selected":""}>黄色(待跟进)</option>
      <option value="block" ${c.tagColor==="block"?"selected":""}>红色(阻塞)</option>
      <option value="idea" ${c.tagColor==="idea"?"selected":""}>灰色(构想中)</option>
    </select>
    <label>渠道 / 背景</label><textarea id="m-where">${escapeHtml(c.where)}</textarea>
    <label>要点(每行一个,支持 &lt;b&gt;、&lt;a href&gt; 等 HTML)</label>
    <textarea id="m-items" style="min-height:140px">${c.items.map(it=>it).join("\n")}</textarea>
    <label>下一步</label><textarea id="m-next">${c.next}</textarea>
    <div class="modal-actions">
      <button class="btn" id="m-cancel">取消</button>
      <button class="btn primary" id="m-save">保存</button>
    </div>`;
  m.classList.add("show");
  document.getElementById("m-cancel").onclick = ()=>m.classList.remove("show");
  document.getElementById("m-save").onclick = ()=>{
    c.num = document.getElementById("m-num").value;
    c.title = document.getElementById("m-title").value;
    c.tag = document.getElementById("m-tag").value;
    c.tagColor = document.getElementById("m-tagColor").value;
    c.where = document.getElementById("m-where").value;
    c.items = document.getElementById("m-items").value.split("\n").map(s=>s.trim()).filter(Boolean);
    c.next = document.getElementById("m-next").value;
    saveState(); m.classList.remove("show"); render();
  };
}

// ============ Export / Reset ============
document.getElementById("btn-export").addEventListener("click", ()=>{
  // serialize state into the data script and download the HTML
  const html = document.documentElement.outerHTML.replace(
    /(<script type="application\/json" id="board-data">)[\s\S]*?(<\/script>)/,
    "$1\n" + JSON.stringify(state, null, 2) + "\n$2"
  );
  const blob = new Blob(["<!DOCTYPE html>\n" + html], {type:"text/html"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "revenue-board.html"; a.click();
  URL.revokeObjectURL(url);
});
document.getElementById("btn-reset").addEventListener("click", ()=>{
  if (!confirm("还原到文件中保存的版本?(会丢失浏览器里的本地修改)")) return;
  localStorage.removeItem(STORAGE_KEY);
  state = JSON.parse(JSON.stringify(initialData));
  render();
});

// ============ Init ============
render();
</script>
